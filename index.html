<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f4f8;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        h1 { color: #1a73e8; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitulo { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .btn-primario { background: #1a73e8; color: white; }
        .btn-primario:hover { background: #1558b0; }

        .btn-secundario { background: #f1f3f4; color: #333; margin-top: 0.75rem; font-size: 0.875rem; }
        .btn-secundario:hover { background: #e2e5e9; }

        .boas-vindas { color: #333; margin-bottom: 1.5rem; line-height: 1.5; }
        .email { font-size: 0.85rem; color: #888; }

        #tela-app { display: none; }
    </style>
</head>
<body>

<div class="card">

    <div id="tela-login">
        <h1>Clínica App</h1>
        <p class="subtitulo">Sistema de gestão para sua clínica</p>
        <button class="btn btn-primario" id="btn-login">Entrar com Google</button>
    </div>

    <div id="tela-app">
        <h1>Clínica App</h1>
        <p class="boas-vindas" id="msg-boas-vindas"></p>
        <button class="btn btn-secundario" id="btn-logout">Sair</button>
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    const CLIENT_ID = '739223236653-k755g3ncb1t17ei52dlq0ifa2o159aa0.apps.googleusercontent.com';

    const ESCOPOS = [
        'https://www.googleapis.com/auth/userinfo.profile',
        'https://www.googleapis.com/auth/userinfo.email',
        'https://www.googleapis.com/auth/spreadsheets',
        'https://www.googleapis.com/auth/drive.file',
        'https://www.googleapis.com/auth/calendar'
    ].join(' ');

    let tokenClient = null;
    let accessToken = null;

    document.getElementById('btn-login').addEventListener('click', () => {
        if (!tokenClient) {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: ESCOPOS,
                callback: handleToken,
            });
        }
        tokenClient.requestAccessToken();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
        google.accounts.oauth2.revoke(accessToken, () => {
            accessToken = null;
            document.getElementById('tela-app').style.display = 'none';
            document.getElementById('tela-login').style.display = 'block';
        });
    });

    function handleToken(resposta) {
        if (resposta.error) {
            alert('Erro no login: ' + resposta.error);
            return;
        }
        accessToken = resposta.access_token;
        buscarUsuario();
    }

    function buscarUsuario() {
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: 'Bearer ' + accessToken }
        })
        .then(r => r.json())
        .then(usuario => {
            console.log('Fase 0 OK — usuário logado:', usuario.name);
            document.getElementById('msg-boas-vindas').innerHTML =
                'Olá, <strong>' + usuario.name + '</strong>!<br>' +
                '<span class="email">' + usuario.email + '</span>';
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-app').style.display = 'block';
        })
        .catch(erro => {
            console.error('Erro ao buscar usuário:', erro);
            alert('Não foi possível carregar seus dados. Tente novamente.');
        });
    }
</script>

</body>
</html>
