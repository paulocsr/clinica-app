<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f4f8;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }
        h1 { color: #1a73e8; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitulo { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .btn-primario { background: #1a73e8; color: white; }
        .btn-primario:hover { background: #1558b0; }

        /* Tela de progresso */
        #tela-loading { display: none; }
        #progresso-msg { color: #555; margin-bottom: 1rem; font-size: 0.9rem; }
        .barra-fundo {
            background: #e8eaed;
            border-radius: 8px;
            height: 10px;
            overflow: hidden;
        }
        #progresso-barra {
            background: #1a73e8;
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 8px;
        }
        .erro { color: #d93025; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="card">

    <div id="tela-login">
        <h1>Clínica App</h1>
        <p class="subtitulo">Sistema de gestão para sua clínica</p>
        <button class="btn btn-primario" id="btn-login">Entrar com Google</button>
        <p class="erro" id="msg-erro"></p>
    </div>

    <div id="tela-loading">
        <h1>Clínica App</h1>
        <p class="subtitulo">Preparando seu sistema...</p>
        <p id="progresso-msg">Iniciando...</p>
        <div class="barra-fundo">
            <div id="progresso-barra"></div>
        </div>
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth.js"></script>
<script src="js/api/driveService.js"></script>
<script src="js/api/sheetsService.js"></script>
<script src="js/setup.js"></script>
<script>
    // Se já tem token válido, vai direto para o setup (que redireciona para app.html)
    window.addEventListener('load', async () => {
        const token = AUTH.getToken();
        if (token) {
            mostrarLoading();
            await Setup.executar(token);
        }
    });

    document.getElementById('btn-login').addEventListener('click', () => {
        AUTH.solicitarToken(async (resposta) => {
            if (resposta.error) {
                document.getElementById('msg-erro').textContent = 'Erro no login: ' + resposta.error;
                return;
            }
            AUTH.salvarToken(resposta.access_token, resposta.expires_in);

            // Buscar e salvar dados do usuário
            try {
                const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { Authorization: 'Bearer ' + resposta.access_token }
                });
                const usuario = await r.json();
                AUTH.salvarUsuario(usuario);
                console.log('Login OK:', usuario.name);
            } catch (e) {
                console.warn('Não foi possível buscar dados do usuário:', e);
            }

            mostrarLoading();
            await Setup.executar(resposta.access_token);
        });
    });

    function mostrarLoading() {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('tela-loading').style.display = 'block';
    }
</script>
</body>
</html>
